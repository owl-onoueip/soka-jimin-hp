<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>草加自民党・無所属の会 | 公式サイト準備中</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  background: linear-gradient(160deg, #fdf6e3 0%, #fef9ee 50%, #fff8f0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

.card {
  background: rgba(255,255,255,0.85);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(180,140,60,0.12), 0 2px 8px rgba(0,0,0,0.06);
  padding: 40px 32px 36px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  border: 1px solid rgba(255,210,100,0.3);
}

.logo {
  width: 90px;
  height: auto;
  margin-bottom: 20px;
  border-radius: 50%;
}

.org-name {
  font-size: 13px;
  font-weight: 900;
  color: #b8860b;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.title {
  font-size: 22px;
  font-weight: 900;
  color: #1e3a6e;
  margin-bottom: 28px;
  line-height: 1.4;
}

/* イラスト */
.illustration {
  margin: 0 auto 28px;
  width: 100%;
  max-width: 360px;
}

.divider {
  width: 48px;
  height: 3px;
  background: linear-gradient(90deg, #fbbf24, #f59e0b);
  border-radius: 2px;
  margin: 0 auto 24px;
}

.message {
  font-size: 15px;
  color: #4a5568;
  line-height: 2;
  margin-bottom: 24px;
  font-weight: 500;
}

.wait {
  display: inline-block;
  background: linear-gradient(135deg, #1e3a6e, #2a5298);
  color: #fff;
  font-size: 15px;
  font-weight: 900;
  padding: 12px 32px;
  border-radius: 50px;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  box-shadow: 0 4px 16px rgba(30,58,110,0.25);
}

.dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}
.dot {
  width: 8px;
  height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.2s; background: #f59e0b; }
.dot:nth-child(3) { animation-delay: 0.4s; background: #d97706; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
  40% { transform: translateY(-8px); opacity: 1; }
}

.footer-note {
  margin-top: 28px;
  font-size: 12px;
  color: #a0aec0;
  line-height: 1.7;
}
</style>
</head>
